<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 포스팅 도우미</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">블로그 포스팅 도우미</h1>

    <!-- 현재 페이지 감지 표시 -->
    <div id="page-info" class="page-info">
      <span id="page-type">페이지를 감지하는 중...</span>
    </div>

    <!-- 상태 메시지 -->
    <div id="status" class="status hidden"></div>

    <!-- 진행 바 -->
    <div id="progress-wrap" class="progress-wrap hidden">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="progress-text" class="progress-text"></p>
    </div>

    <!-- 버튼 -->
    <div class="actions">
      <button id="btn-generate" class="btn btn-primary" disabled>
        포스팅 생성하기
      </button>
      <button id="btn-post" class="btn btn-secondary hidden">
        블로그에 올리기
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
