<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 포스팅 도우미</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">블로그 포스팅 도우미</h1>

    <!-- 제휴/제품 링크 입력 -->
    <div class="affiliate-wrap">
      <label class="input-label">제휴 링크 또는 상품 URL</label>
      <input
        id="affiliate-url"
        type="text"
        class="input-field"
        placeholder="https://naver.me/xxxxxxxx"
      />
    </div>

    <!-- 상태 메시지 -->
    <div id="status" class="status hidden"></div>

    <!-- 진행 바 -->
    <div id="progress-wrap" class="progress-wrap hidden">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="progress-text" class="progress-text"></p>
    </div>

    <!-- 버튼 -->
    <div class="actions">
      <button id="btn-generate" class="btn btn-primary">
        포스팅 생성하기
      </button>
      <button id="btn-post" class="btn btn-secondary hidden">
        블로그에 올리기
      </button>
    </div>

    <!-- 미리보기 -->
    <div id="preview-wrap" class="preview-wrap hidden">
      <div class="preview-header">
        <span class="preview-label">미리보기</span>
        <button id="btn-preview-toggle" class="btn-toggle">펼치기</button>
      </div>
      <div id="preview-content" class="preview-content hidden">
        <p id="preview-title" class="preview-title"></p>
        <div id="preview-tags" class="preview-tags"></div>
        <div id="preview-sections" class="preview-sections"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
